# =============================================================================
# DOCKER COMPOSE — Infraestructura de desarrollo local
# =============================================================================
# Levanta todos los servicios necesarios con: docker-compose up -d
#
# Servicios:
#   - app: Django API
#   - postgres: Base de datos SQL
#   - mongo: Base de datos NoSQL
#   - redis: Caché y broker
#   - kafka + zookeeper: Mensajería event-driven
#   - rabbitmq: Mensajería AMQP / Celery broker
#   - prometheus + grafana: Métricas y dashboards

version: '3.9'

services:
  # ===========================================================================
  # APLICACIÓN DJANGO
  # ===========================================================================
  app:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_started

  # Celery worker — procesa tareas asíncronas
  celery_worker:
    build: .
    command: celery -A config.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - rabbitmq

  # Celery Beat — tareas programadas (cron)
  celery_beat:
    build: .
    command: celery -A config.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis

  # ===========================================================================
  # POSTGRESQL
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: techlead_db
      POSTGRES_USER: techlead_user
      POSTGRES_PASSWORD: techlead_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techlead_user -d techlead_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # MONGODB
  # ===========================================================================
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: techlead_mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  # ===========================================================================
  # REDIS
  # ===========================================================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # KAFKA + ZOOKEEPER
  # ===========================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ===========================================================================
  # RABBITMQ
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine  # Con plugin de management UI
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # UI de gestión: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ===========================================================================
  # PROMETHEUS (métricas)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ===========================================================================
  # GRAFANA (dashboards)
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
